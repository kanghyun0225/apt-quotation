<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한스코퍼레이션 자재주문</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.20.2/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f0f2f5;color:#222;min-height:100vh}

/* ── 헤더 ── */
#hdr{position:sticky;top:0;z-index:100;background:#1a3a5c;color:#fff;display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
#hdr .logo{font-size:17px;font-weight:700;white-space:nowrap;letter-spacing:-.5px}
#hdr .logo span{color:#f0c040}
#search-wrap{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.15);border-radius:8px;padding:0 12px;max-width:480px}
#search-wrap svg{opacity:.7;flex-shrink:0}
#q{background:none;border:none;outline:none;color:#fff;font-size:14px;padding:8px 8px;flex:1;min-width:0}
#q::placeholder{color:rgba(255,255,255,.55)}
#btn-clear-q{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:16px;display:none;padding:0 2px}
#cart-btn{position:relative;background:#f0c040;border:none;border-radius:8px;cursor:pointer;padding:8px 14px;font-weight:700;font-size:13px;color:#1a3a5c;display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
#cart-badge{background:#e84040;color:#fff;border-radius:99px;font-size:11px;font-weight:700;padding:1px 6px;min-width:20px;text-align:center;display:none}

/* ── 레이아웃 ── */
#main-wrap{display:flex;min-height:calc(100vh - 56px)}

/* ── 대분류 사이드바 ── */
#sidebar{width:150px;flex-shrink:0;background:#fff;border-right:1px solid #e0e4ea;overflow-y:auto}
.main-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 8px;cursor:pointer;border-left:3px solid transparent;gap:6px;transition:all .15s;border-bottom:1px solid #f0f2f5;text-align:center}
.main-item:hover{background:#f0f4ff}
.main-item.active{background:#eef3ff;border-left-color:#2456a4;color:#2456a4;font-weight:700}
.main-icon{font-size:24px;line-height:1}
.main-label{font-size:11px;line-height:1.3;word-break:keep-all}

/* ── 컨텐츠 영역 ── */
#content{flex:1;min-width:0;padding:16px}

/* 브레드크럼 */
#breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:#666;margin-bottom:14px;flex-wrap:wrap}
#breadcrumb .crumb{cursor:pointer;color:#2456a4}
#breadcrumb .crumb:hover{text-decoration:underline}
#breadcrumb .sep{color:#bbb}
#breadcrumb .current{color:#222;font-weight:600}

/* 소분류 그리드 */
#sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.sub-card{background:#fff;border:1px solid #e0e4ea;border-radius:10px;padding:14px 10px;cursor:pointer;text-align:center;transition:all .15s;font-size:13px;line-height:1.4;word-break:keep-all}
.sub-card:hover{border-color:#2456a4;background:#eef3ff;color:#2456a4;transform:translateY(-1px)}
.sub-count{font-size:11px;color:#888;margin-top:4px}

/* 소분류 검색 */
#sub-filter-wrap{margin-bottom:12px;display:none}
#sub-filter{width:100%;max-width:360px;border:1px solid #d0d4da;border-radius:8px;padding:8px 12px;font-size:13px;outline:none}
#sub-filter:focus{border-color:#2456a4}

/* 상품 그리드 */
#items-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
#items-count{font-size:13px;color:#666}
#sort-sel{border:1px solid #d0d4da;border-radius:6px;padding:6px 10px;font-size:13px;outline:none;background:#fff}
#prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}

/* 상품 카드 */
.pcard{background:#fff;border:1px solid #e0e4ea;border-radius:12px;overflow:hidden;cursor:pointer;transition:all .15s;display:flex;flex-direction:column}
.pcard:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:#2456a4}
.pcard-img{width:100%;aspect-ratio:1;object-fit:contain;padding:12px;background:#fafafa;border-bottom:1px solid #f0f2f5}
.pcard-img-err{width:100%;aspect-ratio:1;display:none;align-items:center;justify-content:center;font-size:36px;color:#ccc;background:#fafafa;border-bottom:1px solid #f0f2f5}
.pcard-body{padding:10px;flex:1;display:flex;flex-direction:column;gap:4px}
.pcard-name{font-size:12px;line-height:1.4;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.pcard-brand{font-size:11px;color:#888}
.pcard-price{font-size:14px;font-weight:700;color:#2456a4}
.pcard-unit{font-size:11px;color:#999}
.pcard-btn{margin:0 10px 10px;background:#2456a4;color:#fff;border:none;border-radius:8px;padding:7px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.pcard-btn:hover{background:#1a3a5c}

/* 페이지네이션 */
#pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:20px;flex-wrap:wrap}
.pg-btn{border:1px solid #d0d4da;background:#fff;border-radius:8px;padding:7px 13px;font-size:13px;cursor:pointer;transition:all .15s}
.pg-btn:hover{border-color:#2456a4;color:#2456a4}
.pg-btn.active{background:#2456a4;border-color:#2456a4;color:#fff;font-weight:700}
.pg-btn:disabled{opacity:.4;cursor:default}

/* 검색 배너 */
#search-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;font-size:13px;color:#856404;margin-bottom:12px;display:none}

/* ── 장바구니 패널 ── */
#cart-panel{position:fixed;top:0;right:-420px;width:420px;height:100vh;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.15);z-index:200;display:flex;flex-direction:column;transition:right .3s ease}
#cart-panel.open{right:0}
#cart-hdr{background:#1a3a5c;color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
#cart-hdr h2{font-size:16px}
#cart-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1}
#cart-body{flex:1;overflow-y:auto;padding:16px}
.citem{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f0f2f5;align-items:flex-start}
.citem-img{width:52px;height:52px;object-fit:contain;border:1px solid #eee;border-radius:6px;flex-shrink:0}
.citem-info{flex:1;min-width:0}
.citem-name{font-size:12px;line-height:1.4;margin-bottom:3px}
.citem-price{font-size:13px;font-weight:700;color:#2456a4}
.citem-ctrl{display:flex;align-items:center;gap:6px;margin-top:6px}
.qty-btn{width:26px;height:26px;border:1px solid #d0d4da;border-radius:6px;background:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.qty-btn:hover{background:#f0f2f5}
.qty-val{font-size:14px;font-weight:600;min-width:24px;text-align:center}
.citem-del{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;margin-left:auto;padding:0 2px}
.citem-del:hover{color:#e84040}
#cart-footer{padding:16px;border-top:1px solid #e0e4ea;background:#fafafa}
#cart-total-row{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:16px;margin-bottom:12px}
.cart-action-btns{display:flex;gap:8px}
.cart-action-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
#btn-excel{background:#217346;color:#fff}
#btn-email{background:#e84040;color:#fff}
#btn-clear-cart{background:#f0f2f5;color:#555}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;display:none}
#overlay.show{display:block}

/* 모달 (상품 상세) */
#modal{display:none;position:fixed;inset:0;z-index:300;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.5)}
#modal.show{display:flex}
#modal-box{background:#fff;border-radius:16px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative}
#modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:24px;cursor:pointer;color:#888}
#modal-img{width:100%;max-height:280px;object-fit:contain;margin-bottom:16px;border-radius:8px;border:1px solid #eee;padding:12px}
#modal-name{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.4}
#modal-brand{font-size:13px;color:#888;margin-bottom:4px}
#modal-code{font-size:12px;color:#999;margin-bottom:12px}
#modal-price{font-size:24px;font-weight:700;color:#2456a4;margin-bottom:6px}
#modal-unit{font-size:13px;color:#666;margin-bottom:16px}
#modal-qty-row{display:flex;align-items:center;gap:12px;margin-bottom:4px}
#modal-qty{width:60px;text-align:center;border:1px solid #d0d4da;border-radius:8px;padding:8px;font-size:16px;font-weight:700}
#modal-add{flex:1;background:#2456a4;color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer}
#modal-add:hover{background:#1a3a5c}

/* 로딩 */
#loading{position:fixed;inset:0;background:rgba(255,255,255,.98);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading h2{color:#1a3a5c;font-size:18px}
#prog-bar-wrap{width:280px;background:#e0e4ea;border-radius:99px;height:8px;overflow:hidden}
#prog-bar{width:0%;height:100%;background:#2456a4;border-radius:99px;transition:width .1s}
#prog-text{font-size:13px;color:#888}

/* 빈 상태 */
.empty-state{text-align:center;padding:60px 20px;color:#aaa}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px}

/* ── 모바일 bottom nav ── */
#bottom-nav{display:none}

/* ── PC (641px 이상) ── */
@media(min-width:641px){
  #sidebar{height:calc(100vh - 56px);position:sticky;top:56px;overflow-y:auto}
  #prod-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
  #sub-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .pcard-name{font-size:13px}
  .pcard-price{font-size:15px}
}

/* ── 태블릿 (641~900px) ── */
@media(min-width:641px) and (max-width:900px){
  #sidebar{width:120px}
  .main-label{font-size:10px}
  #prod-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}

/* ── 모바일 (640px 이하) ── */
@media(max-width:640px){
  /* 헤더 */
  #hdr{gap:8px;padding:0 10px;height:52px}
  #hdr .logo{font-size:15px}
  #search-wrap{padding:0 8px}
  #q{font-size:13px;padding:6px}
  #cart-btn{padding:6px 10px;font-size:12px;gap:4px}

  /* 사이드바 숨기고 bottom nav 표시 */
  #sidebar{display:none}
  #bottom-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;
    z-index:100;
    background:#fff;
    border-top:1px solid #d0d4ea;
    box-shadow:0 -2px 8px rgba(0,0,0,.1);
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    height:56px;
  }
  #bottom-nav::-webkit-scrollbar{display:none}
  .bn-item{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    flex:1;min-width:52px;max-width:72px;
    padding:4px 4px;cursor:pointer;
    border-top:3px solid transparent;
    gap:2px;transition:all .15s;color:#666;
  }
  .bn-item.active{border-top-color:#2456a4;color:#2456a4}
  .bn-icon{font-size:18px;line-height:1}
  .bn-label{font-size:9px;font-weight:600;white-space:nowrap;letter-spacing:-.5px;line-height:1.1}

  /* 콘텐츠 */
  #main-wrap{min-height:calc(100vh - 52px - 56px)}
  #content{padding:10px 10px 66px}
  #cart-panel{width:100%;right:-100%}
  #cart-panel.open{right:0}

  /* 그리드 — 2열 고정 */
  #prod-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  #sub-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .sub-card{padding:10px 6px;font-size:12px}

  /* 카드 */
  .pcard-name{font-size:11px;-webkit-line-clamp:2}
  .pcard-brand{font-size:10px}
  .pcard-unit{font-size:10px}
  .pcard-price{font-size:13px}
  .pcard-btn{font-size:11px;padding:6px;margin:0 8px 8px}

  /* 페이지네이션 */
  #pagination{padding-bottom:8px;gap:4px}
  .pg-btn{padding:6px 10px;font-size:12px}

  /* 모달 */
  #modal{padding:0;align-items:flex-end}
  #modal-box{border-radius:16px 16px 0 0;max-height:85vh;padding:20px 16px}

  /* 장바구니 */
  .citem-img{width:44px;height:44px}
  #cart-hdr{padding:12px 16px}
  #cart-footer{padding:12px}
}
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loading">
  <h2>🔧 한스코퍼레이션 자재주문</h2>
  <div id="prog-bar-wrap"><div id="prog-bar"></div></div>
  <div id="prog-text">상품 데이터 로딩 중...</div>
</div>

<!-- 헤더 -->
<div id="hdr">
  <div class="logo" id="logo" style="cursor:pointer;user-select:none" title="">한스<span>코퍼레이션</span></div>
  <div id="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="q" type="text" placeholder="상품명, 브랜드 검색...">
    <button id="btn-clear-q" title="지우기">✕</button>
  </div>
  <button id="cart-btn">
    🛒 장바구니
    <span id="cart-badge">0</span>
  </button>
</div>

<!-- 모바일 bottom nav (JS로 채움) -->
<div id="bottom-nav"></div>

<div id="main-wrap">
  <!-- 대분류 사이드바 (데스크탑) -->
  <div id="sidebar"></div>

  <!-- 컨텐츠 -->
  <div id="content">
    <div id="breadcrumb"></div>
    <div id="search-banner"></div>
    <div id="sub-filter-wrap"><input id="sub-filter" type="text" placeholder="소분류 검색..."></div>
    <div id="sub-grid"></div>
    <div id="items-header" style="display:none">
      <div id="items-count"></div>
      <select id="sort-sel">
        <option value="default">기본 정렬</option>
        <option value="price-asc">가격 낮은순</option>
        <option value="price-desc">가격 높은순</option>
        <option value="name">이름순</option>
      </select>
    </div>
    <div id="prod-grid"></div>
    <div id="pagination"></div>
  </div>
</div>

<!-- 오버레이 -->
<div id="overlay"></div>

<!-- 장바구니 패널 -->
<div id="cart-panel">
  <div id="cart-hdr">
    <h2>🛒 장바구니</h2>
    <button id="cart-close">✕</button>
  </div>
  <div id="cart-body"></div>
  <div id="cart-footer">
    <div id="cart-total-row">
      <span>합계</span>
      <span id="cart-total">₩0</span>
    </div>
    <div class="cart-action-btns">
      <button id="btn-excel">📥 엑셀</button>
      <button id="btn-email">📧 이메일</button>
      <button id="btn-clear-cart">비우기</button>
    </div>
  </div>
</div>

<!-- 상품 상세 모달 -->
<div id="modal">
  <div id="modal-box">
    <button id="modal-close">✕</button>
    <img id="modal-img" src="" alt="">
    <div id="modal-name"></div>
    <div id="modal-brand"></div>
    <div id="modal-code"></div>
    <div id="modal-price"></div>
    <div id="modal-unit"></div>
    <div id="modal-qty-row">
      <button class="qty-btn" id="modal-qty-minus">−</button>
      <input id="modal-qty" type="number" value="1" min="1">
      <button class="qty-btn" id="modal-qty-plus">+</button>
      <button id="modal-add">장바구니 담기</button>
    </div>
  </div>
</div>

<!-- 관리자 설정 모달 -->
<div id="admin-modal" style="display:none;position:fixed;inset:0;z-index:400;align-items:center;justify-content:center;background:rgba(0,0,0,.5)">
  <div style="background:#fff;border-radius:16px;padding:28px 24px;width:320px;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.2)">
    <div style="font-size:16px;font-weight:700;margin-bottom:4px">🔐 관리자 설정</div>
    <div style="font-size:12px;color:#888;margin-bottom:20px">설정값은 이 기기에만 저장됩니다</div>
    <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px">마진율 (%)</label>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <input id="admin-margin" type="number" min="0" max="100" step="0.5"
        style="flex:1;border:1px solid #d0d4da;border-radius:8px;padding:10px 12px;font-size:18px;font-weight:700;text-align:center;outline:none">
      <span style="font-size:18px;font-weight:700;color:#888">%</span>
    </div>
    <div style="font-size:11px;color:#aaa;margin-bottom:20px">예) 30 입력 시 공급가 × 1.3, 10원 단위 올림 적용</div>
    <div style="display:flex;gap:8px">
      <button onclick="saveAdminMargin()" style="flex:1;background:#2456a4;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer">저장</button>
      <button onclick="closeAdmin()" style="flex:1;background:#f0f2f5;color:#555;border:none;border-radius:8px;padding:11px;font-size:14px;cursor:pointer">취소</button>
    </div>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  마진율: localStorage에서 로드, 기본값 30%
//  (헤더 로고를 5번 빠르게 클릭하면 관리자 설정창)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let MARGIN_RATE = parseFloat(localStorage.getItem('hs_margin') || '0.30');
const IMG_BASE = 'https://ctx.cretec.kr/CtxApp/resource/SBI_ITEM_IMG/';
const ORDER_EMAIL = 'kanghyun0225@gmail.com';
const PAGE_SIZE = 48;
const COMPANY_NAME = '한스코퍼레이션';

// 공급단가 × (1+마진율) 후 10원 단위 올림
function mp(raw){ return raw ? Math.ceil(raw * (1 + MARGIN_RATE) / 10) * 10 : 0; }
function fmt(n){ return (+n).toLocaleString('ko-KR'); }

const MAIN_ICONS = ['🔧','🔩','⚙️','📐','⚡','💨','🔥','🦺','🏭'];
// 모바일 bottom nav용 짧은 레이블 (9자 이내)
const SHORT_LABELS = ['공구','철물','절삭','측정','전동','에어','용접','안전','산업'];

let DB = null;
let cart = {}; // { prod_cd: { item, qty } }
let state = { mainIdx: null, catIdx: null, page: 0, q: '', sort: 'default' };
let filteredItems = [];
let modalItem = null;
let subCatsCache = [];

// ──────────────────────────────────────
// 데이터 로딩
// ──────────────────────────────────────
async function loadData(){
  const resp = await fetch('./cretec_lite.json?v=3');
  const total = +resp.headers.get('content-length') || 0;
  const reader = resp.body.getReader();
  let chunks = [], received = 0;
  while(true){
    const {done, value} = await reader.read();
    if(done) break;
    chunks.push(value);
    received += value.length;
    if(total){
      const pct = Math.round(received/total*100);
      document.getElementById('prog-bar').style.width = pct+'%';
      document.getElementById('prog-text').textContent =
        `${Math.round(received/1024/1024*10)/10}MB / ${Math.round(total/1024/1024*10)/10}MB`;
    }
  }
  const raw = new Uint8Array(received);
  let offset=0;
  for(const c of chunks){ raw.set(c,offset); offset+=c.length; }
  DB = JSON.parse(new TextDecoder().decode(raw));

  // 검색 인덱스
  DB.namesLower = DB.items.map(it=>it[1].toLowerCase());
  DB.brandsLower = DB.items.map(it=>(DB.brands[it[2]]||'').toLowerCase());

  // 소분류별 상품 수
  DB.catCount = new Array(DB.cats.length).fill(0);
  for(const it of DB.items) DB.catCount[it[6]]++;

  // 빠른 조회: prod_cd → item
  DB.codeMap = {};
  for(const it of DB.items) DB.codeMap[it[0]] = it;

  document.getElementById('loading').style.display='none';
  initSidebar();
  render();
}

// ──────────────────────────────────────
// 사이드바
// ──────────────────────────────────────
function initSidebar(){
  // 데스크탑 사이드바
  const sb = document.getElementById('sidebar');
  sb.innerHTML = DB.mains.map((m,i)=>`
    <div class="main-item" data-mi="${i}" onclick="selectMain(${i})">
      <div class="main-icon">${MAIN_ICONS[i]}</div>
      <div class="main-label">${m}</div>
    </div>`).join('');

  // 모바일 bottom nav
  const bn = document.getElementById('bottom-nav');
  bn.innerHTML = DB.mains.map((m,i)=>`
    <div class="bn-item" data-mi="${i}" onclick="selectMain(${i})">
      <div class="bn-icon">${MAIN_ICONS[i]}</div>
      <div class="bn-label">${SHORT_LABELS[i]}</div>
    </div>`).join('');
}

function selectMain(idx){
  state.mainIdx = idx; state.catIdx = null; state.page = 0;
  state.q = ''; document.getElementById('q').value = '';
  document.getElementById('btn-clear-q').style.display='none';
  render();
}

function selectCat(idx){
  state.catIdx = idx; state.page = 0; render();
}

function goHome(){
  state.mainIdx = null; state.catIdx = null; state.page = 0;
  state.q = ''; document.getElementById('q').value = '';
  document.getElementById('btn-clear-q').style.display='none';
  render();
}

// ──────────────────────────────────────
// 메인 렌더
// ──────────────────────────────────────
function render(){
  updateSidebarActive();
  const isSearch = state.q.length >= 2;
  if(isSearch)             renderSearch();
  else if(state.mainIdx === null) renderHome();
  else if(state.catIdx === null)  renderSubGrid();
  else                     renderProducts();
  renderBreadcrumb();
  renderCartBadge();
}

function updateSidebarActive(){
  document.querySelectorAll('.main-item, .bn-item').forEach(el=>{
    el.classList.toggle('active', +el.dataset.mi === state.mainIdx);
  });
}

// 홈 (9개 대분류 타일)
function renderHome(){
  document.getElementById('sub-filter-wrap').style.display='none';
  document.getElementById('search-banner').style.display='none';
  document.getElementById('items-header').style.display='none';
  document.getElementById('pagination').innerHTML='';
  document.getElementById('prod-grid').innerHTML='';

  const grid = document.getElementById('sub-grid');
  grid.innerHTML = DB.mains.map((m,i)=>{
    let cnt=0;
    DB.catMain.forEach((mi,ci)=>{ if(mi===i) cnt+=DB.catCount[ci]||0; });
    return `<div class="sub-card" onclick="selectMain(${i})" style="padding:20px 12px">
      <div style="font-size:36px;margin-bottom:8px">${MAIN_ICONS[i]}</div>
      <div style="font-weight:600;font-size:14px">${m}</div>
      <div class="sub-count">${fmt(cnt)}개 상품</div>
    </div>`;
  }).join('');
}

// 소분류 그리드
function renderSubGrid(){
  document.getElementById('items-header').style.display='none';
  document.getElementById('pagination').innerHTML='';
  document.getElementById('prod-grid').innerHTML='';
  document.getElementById('search-banner').style.display='none';

  subCatsCache = [];
  DB.cats.forEach((name,ci)=>{
    if(DB.catMain[ci]===state.mainIdx && DB.catCount[ci]>0)
      subCatsCache.push({name,ci,cnt:DB.catCount[ci]});
  });
  subCatsCache.sort((a,b)=>b.cnt-a.cnt);

  const sfWrap = document.getElementById('sub-filter-wrap');
  if(subCatsCache.length >= 20){
    sfWrap.style.display='block';
    document.getElementById('sub-filter').value='';
  } else {
    sfWrap.style.display='none';
  }
  renderSubCards();
}

function renderSubCards(){
  const qsub = (document.getElementById('sub-filter').value||'').trim().toLowerCase();
  const filtered = qsub ? subCatsCache.filter(s=>s.name.toLowerCase().includes(qsub)) : subCatsCache;
  const grid = document.getElementById('sub-grid');
  if(filtered.length===0){
    grid.innerHTML='<div class="empty-state"><div class="icon">🔍</div><p>검색 결과 없음</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(s=>`
    <div class="sub-card" onclick="selectCat(${s.ci})">
      <div>${s.name}</div>
      <div class="sub-count">${fmt(s.cnt)}개</div>
    </div>`).join('');
}

// 상품 목록
function renderProducts(){
  document.getElementById('sub-grid').innerHTML='';
  document.getElementById('sub-filter-wrap').style.display='none';
  document.getElementById('search-banner').style.display='none';
  filteredItems = sortItems(DB.items.filter(it=>it[6]===state.catIdx));
  showItemsPage();
}

// 검색 결과
function renderSearch(){
  document.getElementById('sub-grid').innerHTML='';
  document.getElementById('sub-filter-wrap').style.display='none';
  const q = state.q.toLowerCase();
  const hits = [];
  for(let i=0;i<DB.items.length;i++){
    if(DB.namesLower[i].includes(q)||DB.brandsLower[i].includes(q)) hits.push(DB.items[i]);
  }
  filteredItems = sortItems(hits);
  const banner = document.getElementById('search-banner');
  banner.style.display='block';
  banner.textContent = `"${state.q}" 검색 결과: ${fmt(filteredItems.length)}개`;
  showItemsPage();
}

function sortItems(items){
  const s = state.sort;
  if(s==='price-asc')  return [...items].sort((a,b)=>a[3]-b[3]);
  if(s==='price-desc') return [...items].sort((a,b)=>b[3]-a[3]);
  if(s==='name')       return [...items].sort((a,b)=>a[1].localeCompare(b[1],'ko'));
  return items;
}

function showItemsPage(){
  const total = filteredItems.length;
  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  state.page = Math.min(state.page, totalPages-1);
  const slice = filteredItems.slice(state.page*PAGE_SIZE, (state.page+1)*PAGE_SIZE);

  const ih = document.getElementById('items-header');
  ih.style.display = 'flex';
  document.getElementById('items-count').textContent = `${fmt(total)}개 상품`;

  const grid = document.getElementById('prod-grid');
  if(slice.length===0){
    grid.innerHTML='<div class="empty-state"><div class="icon">📦</div><p>상품이 없습니다</p></div>';
    document.getElementById('pagination').innerHTML='';
    return;
  }
  grid.innerHTML = slice.map(buildCard).join('');
  renderPagination(totalPages);
  window.scrollTo({top:56,behavior:'smooth'});
}

function cleanBrand(raw){
  // 보관함 HTML 쓰레기 제거: \n, \t, "최근 주문일:..." 등
  return (raw||'').replace(/\s*최근 주문일:[^\n]*/g,'').replace(/[\n\t]/g,' ').replace(/\s+/g,' ').trim();
}

function buildCard(it){
  const [cd,name,bi,price,unit,imgid] = it;
  const brand = cleanBrand(DB.brands[bi]);
  const p = mp(price);
  const imgUrl = IMG_BASE+imgid+'-2-3.jpg';
  const esc = s=>s.replace(/'/g,"\\'");
  return `<div class="pcard" onclick="openModal('${esc(cd)}')">
    <img class="pcard-img" src="${imgUrl}" alt="" loading="lazy"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="pcard-img-err">📦</div>
    <div class="pcard-body">
      <div class="pcard-name" title="${esc(name)}">${name}</div>
      ${unit ? `<div class="pcard-unit">${unit}</div>` : ''}
      <div class="pcard-brand">${brand}</div>
      <div class="pcard-price">₩${fmt(p)}</div>
    </div>
    <button class="pcard-btn" onclick="event.stopPropagation();quickAdd('${esc(cd)}')">+ 담기</button>
  </div>`;
}

function renderPagination(totalPages){
  if(totalPages<=1){document.getElementById('pagination').innerHTML='';return;}
  const p=state.page;
  let html=`<button class="pg-btn" onclick="goPage(0)" ${p===0?'disabled':''}>◀◀</button>`;
  html+=`<button class="pg-btn" onclick="goPage(${p-1})" ${p===0?'disabled':''}>◀</button>`;
  const start=Math.max(0,p-3), end=Math.min(totalPages-1,p+3);
  for(let i=start;i<=end;i++)
    html+=`<button class="pg-btn ${i===p?'active':''}" onclick="goPage(${i})">${i+1}</button>`;
  html+=`<button class="pg-btn" onclick="goPage(${p+1})" ${p===totalPages-1?'disabled':''}>▶</button>`;
  html+=`<button class="pg-btn" onclick="goPage(${totalPages-1})" ${p===totalPages-1?'disabled':''}>▶▶</button>`;
  document.getElementById('pagination').innerHTML=html;
}

function goPage(n){state.page=n;showItemsPage();}

// ──────────────────────────────────────
// 브레드크럼
// ──────────────────────────────────────
function renderBreadcrumb(){
  const el = document.getElementById('breadcrumb');
  const isSearch = state.q.length >= 2;
  if(isSearch){
    el.innerHTML=`<span class="crumb" onclick="goHome()">홈</span><span class="sep">›</span><span class="current">검색: "${state.q}"</span>`;
    return;
  }
  if(state.mainIdx===null){el.innerHTML='<span class="current">전체 카테고리</span>';return;}
  let html=`<span class="crumb" onclick="goHome()">홈</span><span class="sep">›</span>`;
  if(state.catIdx===null){
    html+=`<span class="current">${DB.mains[state.mainIdx]}</span>`;
  } else {
    html+=`<span class="crumb" onclick="selectMain(${state.mainIdx})">${DB.mains[state.mainIdx]}</span>`;
    html+=`<span class="sep">›</span><span class="current">${DB.cats[state.catIdx]}</span>`;
  }
  el.innerHTML=html;
}

// ──────────────────────────────────────
// 모달
// ──────────────────────────────────────
function openModal(cd){
  const it = DB.codeMap[cd];
  if(!it) return;
  modalItem = it;
  const [,name,bi,price,unit,imgid] = it;
  const mImgEl = document.getElementById('modal-img');
  mImgEl.src = IMG_BASE+imgid+'-2-3.jpg';
  mImgEl.onerror = function(){this.src='';this.onerror=null;};
  document.getElementById('modal-name').textContent = name;
  document.getElementById('modal-brand').textContent = cleanBrand(DB.brands[bi]);
  document.getElementById('modal-code').textContent = '품번: '+cd;
  document.getElementById('modal-price').textContent = '₩'+fmt(mp(price));
  document.getElementById('modal-unit').textContent = unit ? '단위: '+unit : '';
  const step = unitStep(unit);
  document.getElementById('modal-qty').value = cart[cd]?.qty || step;
  document.getElementById('modal-qty').step = step;
  document.getElementById('modal-qty').min = step;
  document.getElementById('modal').classList.add('show');
}

// 단위에서 수량 step 추출 (예: "10 / 조" → 10, "1 / EA" → 1)
function unitStep(unit){
  if(!unit) return 1;
  const m = (unit+'').match(/^(\d+)/);
  return (m && parseInt(m[1]) > 1) ? parseInt(m[1]) : 1;
}

document.getElementById('modal-close').onclick = ()=>document.getElementById('modal').classList.remove('show');
document.getElementById('modal').onclick = e=>{if(e.target.id==='modal')document.getElementById('modal').classList.remove('show');};
document.getElementById('modal-qty-minus').onclick = ()=>{
  if(!modalItem) return;
  const inp = document.getElementById('modal-qty');
  const step = unitStep(modalItem[4]);
  const cur = +inp.value;
  inp.value = Math.max(step, cur - step);
};
document.getElementById('modal-qty-plus').onclick = ()=>{
  if(!modalItem) return;
  const inp = document.getElementById('modal-qty');
  const step = unitStep(modalItem[4]);
  inp.value = +inp.value + step;
};
document.getElementById('modal-add').onclick = ()=>{
  if(!modalItem) return;
  const step = unitStep(modalItem[4]);
  const qty = Math.max(step, +document.getElementById('modal-qty').value || step);
  addToCart(modalItem[0], qty);
  document.getElementById('modal').classList.remove('show');
};

// ──────────────────────────────────────
// 장바구니
// ──────────────────────────────────────
function quickAdd(cd){
  const it = DB?.codeMap[cd]; if(!it) return;
  addToCart(cd, unitStep(it[4]));
}

function addToCart(cd, qty){
  if(!DB) return;
  const it = DB.codeMap[cd];
  if(!it) return;
  if(cart[cd]) cart[cd].qty += qty;
  else cart[cd] = {item:it, qty};
  renderCartBadge();
  flashBadge();
}

function flashBadge(){
  const b=document.getElementById('cart-badge');
  b.style.transform='scale(1.5)';
  setTimeout(()=>b.style.transform='',200);
}

function renderCartBadge(){
  const entries=Object.values(cart);
  const totalQty=entries.reduce((s,e)=>s+e.qty,0);
  const badge=document.getElementById('cart-badge');
  badge.textContent=totalQty;
  badge.style.display=totalQty>0?'inline-block':'none';
}

function renderCartPanel(){
  const entries=Object.values(cart);
  const totalAmt=entries.reduce((s,e)=>s+mp(e.item[3])*e.qty,0);
  document.getElementById('cart-total').textContent='₩'+fmt(totalAmt);
  const body=document.getElementById('cart-body');
  if(entries.length===0){
    body.innerHTML='<div class="empty-state"><div class="icon">🛒</div><p>장바구니가 비어 있습니다</p></div>';
    return;
  }
  body.innerHTML=entries.map(({item,qty})=>{
    const [cd,name,bi,price,unit,imgid]=item;
    const p=mp(price);
    const esc=s=>s.replace(/'/g,"\\'");
    return `<div class="citem">
      <img class="citem-img" src="${IMG_BASE+imgid+'-2-3.jpg'}" alt=""
        onerror="this.style.background='#eee';this.src='data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';this.onerror=null">
      <div class="citem-info">
        <div class="citem-name">${name}</div>
        <div class="citem-price">₩${fmt(p)} × ${qty} = ₩${fmt(p*qty)}</div>
        <div class="citem-ctrl">
          <button class="qty-btn" onclick="changeQty('${esc(cd)}',-1)">−</button>
          <span class="qty-val">${qty}</span>
          <button class="qty-btn" onclick="changeQty('${esc(cd)}',1)">+</button>
          <button class="citem-del" onclick="removeCart('${esc(cd)}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function changeQty(cd, dir){
  if(!cart[cd]) return;
  const step = unitStep(cart[cd].item[4]);
  cart[cd].qty = Math.max(step, cart[cd].qty + dir * step);
  renderCartBadge(); renderCartPanel();
}
function removeCart(cd){ delete cart[cd]; renderCartBadge(); renderCartPanel(); }

// 장바구니 열기/닫기
document.getElementById('cart-btn').onclick=()=>{
  renderCartPanel();
  document.getElementById('cart-panel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
};
function closeCart(){
  document.getElementById('cart-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
document.getElementById('cart-close').onclick=closeCart;
document.getElementById('overlay').onclick=closeCart;
document.getElementById('btn-clear-cart').onclick=()=>{cart={};renderCartBadge();renderCartPanel();};

// ──────────────────────────────────────
// 관리자 패널 (로고 5번 빠른 클릭)
// ──────────────────────────────────────
let _logoCnt=0, _logoTimer;
document.getElementById('logo').addEventListener('click',()=>{
  _logoCnt++;
  clearTimeout(_logoTimer);
  _logoTimer=setTimeout(()=>_logoCnt=0, 2000);
  if(_logoCnt>=5){
    _logoCnt=0;
    document.getElementById('admin-margin').value=(MARGIN_RATE*100).toFixed(1);
    document.getElementById('admin-modal').style.display='flex';
  }
});
function saveAdminMargin(){
  const v=parseFloat(document.getElementById('admin-margin').value);
  if(isNaN(v)||v<0||v>300){alert('0~300 사이 숫자를 입력해주세요.');return;}
  MARGIN_RATE=v/100;
  localStorage.setItem('hs_margin',MARGIN_RATE.toString());
  closeAdmin();
  // 현재 화면 가격 즉시 갱신
  if(state.catIdx!==null) renderProducts();
  else if(state.q.length>=2) renderSearch();
  alert(`마진율 ${v}%로 저장됐습니다.`);
}
function closeAdmin(){ document.getElementById('admin-modal').style.display='none'; }

// ──────────────────────────────────────
// 검색
// ──────────────────────────────────────
let searchTimer;
document.getElementById('q').addEventListener('input',function(){
  clearTimeout(searchTimer);
  const v=this.value.trim();
  document.getElementById('btn-clear-q').style.display=v?'block':'none';
  searchTimer=setTimeout(()=>{ state.q=v; state.page=0; render(); },300);
});
document.getElementById('btn-clear-q').onclick=()=>{
  document.getElementById('q').value='';
  document.getElementById('btn-clear-q').style.display='none';
  state.q=''; state.page=0; render();
};
document.getElementById('sub-filter').oninput=renderSubCards;
document.getElementById('sort-sel').onchange=function(){
  state.sort=this.value; state.page=0;
  if(state.q.length>=2) renderSearch();
  else if(state.catIdx!==null) renderProducts();
};

// ──────────────────────────────────────
// 엑셀
// ──────────────────────────────────────
document.getElementById('btn-excel').onclick=()=>{
  const entries=Object.values(cart);
  if(!entries.length){alert('장바구니가 비어 있습니다.');return;}
  const wb=XLSX.utils.book_new();
  const rows=[
    [COMPANY_NAME+' 자재 견적서'],
    ['발주일자',new Date().toLocaleDateString('ko-KR')],
    [],
    ['No','품번','품명','브랜드','단위','단가','수량','소계']
  ];
  let total=0,no=1;
  for(const {item,qty} of entries){
    const [cd,name,bi,price,unit]=item;
    const p=mp(price),sub=p*qty; total+=sub;
    rows.push([no++,cd,name,DB.brands[bi]||'',unit||'',p,qty,sub]);
  }
  rows.push([],[,'','','','','합계','',total]);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:4},{wch:14},{wch:40},{wch:14},{wch:6},{wch:10},{wch:6},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,'견적서');
  XLSX.writeFile(wb,`${COMPANY_NAME}_견적서_${new Date().toISOString().slice(0,10)}.xlsx`);
};

// ──────────────────────────────────────
// 이메일
// ──────────────────────────────────────
document.getElementById('btn-email').onclick=()=>{
  const entries=Object.values(cart);
  if(!entries.length){alert('장바구니가 비어 있습니다.');return;}
  const date=new Date().toLocaleDateString('ko-KR');
  let body=`${COMPANY_NAME} 자재 발주서\n발주일: ${date}\n\n`;
  let total=0,no=1;
  for(const {item,qty} of entries.slice(0,30)){
    const [cd,name,,price,unit]=item;
    const p=mp(price),sub=p*qty; total+=sub;
    body+=`${no++}. [${cd}] ${name}\n   단가: ₩${fmt(p)} × ${qty}${unit?'('+unit+')':''} = ₩${fmt(sub)}\n`;
  }
  if(entries.length>30) body+=`\n... 외 ${entries.length-30}개 품목 (엑셀 첨부 참조)\n`;
  body+=`\n합계: ₩${fmt(total)}\n\n${COMPANY_NAME} 담당자 드림`;
  location.href=`mailto:${ORDER_EMAIL}?subject=${encodeURIComponent(COMPANY_NAME+' 자재발주 '+date)}&body=${encodeURIComponent(body)}`;
};

// ──────────────────────────────────────
// 시작
// ──────────────────────────────────────
loadData().catch(e=>{
  const el=document.getElementById('prog-text');
  el.style.color='#e84040';
  el.textContent='데이터 로딩 실패: '+e.message;
});
