<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아파트 관리사무소 통합 견적 시스템</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic','맑은 고딕',sans-serif; background:#f0f4f8; color:#1a1a2e; font-size:13px; }

/* 헤더 */
.header { background:#1F4E79; color:white; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size:17px; font-weight:700; }
.header p { font-size:11px; opacity:.7; margin-top:2px; }

/* 레이아웃 */
.wrap { display:grid; grid-template-columns:280px 1fr; gap:16px; padding:16px; max-width:1400px; margin:0 auto; }
@media(max-width:900px){ .wrap { grid-template-columns:1fr; } }

/* 카드 */
.card { background:white; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.07); overflow:hidden; }
.card-hd { background:#1F4E79; color:white; padding:10px 16px; font-weight:700; font-size:12px; }
.card-bd { padding:16px; }

/* 입력폼 */
.fg { margin-bottom:11px; }
.fg label { display:block; font-size:11px; font-weight:600; color:#555; margin-bottom:4px; }
.fg input { width:100%; padding:7px 10px; border:1.5px solid #ddd; border-radius:6px; font-size:13px; font-family:inherit; }
.fg input:focus { outline:none; border-color:#1F4E79; }
.sec { font-size:10px; font-weight:700; color:#1F4E79; text-transform:uppercase; letter-spacing:.4px; margin:14px 0 8px; border-bottom:1.5px solid #e0eaf5; padding-bottom:4px; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.btn-calc { width:100%; padding:11px; background:#1F4E79; color:white; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; margin-top:6px; font-family:inherit; }
.btn-calc:hover { background:#16375a; }

/* 탭 */
.tabs { display:flex; border-bottom:2px solid #e0eaf5; margin-bottom:14px; gap:2px; flex-wrap:wrap; }
.tab { padding:8px 14px; cursor:pointer; font-size:12px; font-weight:600; color:#888; border-radius:6px 6px 0 0; border:1px solid transparent; border-bottom:none; transition:all .15s; }
.tab.active { color:#1F4E79; background:white; border-color:#dde3eb; border-bottom:2px solid white; margin-bottom:-2px; }
.tab:hover:not(.active) { color:#1F4E79; background:#f5f8fc; }
.tab-badge { display:inline-block; background:#e8f1fa; color:#1F4E79; border-radius:10px; padding:1px 7px; font-size:10px; margin-left:4px; }

/* 테이블 */
.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; }
thead tr { background:#1F4E79; color:white; }
th { padding:8px 6px; text-align:center; font-size:11px; font-weight:700; }
tbody tr:nth-child(even) { background:#f4f8fc; }
tbody tr:hover { background:#e8f1fa; }
td { padding:6px 6px; border-bottom:1px solid #e8ecf0; vertical-align:middle; }
.tc { text-align:center; }
.tr { text-align:right; }
.tl { text-align:left; }
input.ni { width:60px; padding:3px 5px; border:1.5px solid #ccc; border-radius:4px; text-align:center; font-family:inherit; font-size:12px; }
input.pi { width:95px; padding:3px 5px; border:1.5px solid #ccc; border-radius:4px; text-align:right; font-family:inherit; font-size:12px; }
input.ni:focus, input.pi:focus { outline:none; border-color:#1F4E79; }

/* 합계 */
.total-row { display:flex; justify-content:flex-end; margin-top:14px; }
.total-box { border:1px solid #ddd; border-radius:8px; overflow:hidden; min-width:280px; }
.total-box table { font-size:12px; }
.total-box td { padding:7px 14px; border-bottom:1px solid #eee; }
.total-box .tl2 { background:#D9E1F2; font-weight:700; }
.total-box .grand td { background:#FCE4D6; font-weight:700; font-size:13px; }

/* 요약바 */
.summary-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.sb { background:#EBF3FB; color:#1F4E79; padding:3px 12px; border-radius:20px; font-size:11px; font-weight:600; }
.sb.red { background:#FEF0F0; color:#c0392b; }

/* 빈 상태 */
.empty { text-align:center; padding:60px 20px; color:#aaa; }
.empty div { font-size:40px; margin-bottom:10px; }

/* 툴바 */
.toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px; }
.apt-title { font-size:15px; font-weight:700; color:#1F4E79; }
.btn-sm { padding:7px 14px; border:none; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
.btn-print { background:#2ecc71; color:white; }
.btn-print:hover { background:#27ae60; }
.btn-reset { background:#95a5a6; color:white; }
.btn-reset:hover { background:#7f8c8d; }

.note { font-size:10px; color:#999; margin-top:8px; }
/* 판매단가 컬럼 - 화면에서는 표시, 인쇄에서는 공급단가 숨기고 이걸 표시 */
.no-print-col { color:#e67e22; font-weight:700; }


/* ── 모바일 최적화 ── */
@media(max-width:640px){
  body { font-size:14px; }
  .header { padding:12px 16px; }
  .header h1 { font-size:15px; }
  .wrap { padding:10px; gap:12px; }
  .card-bd { padding:12px; }

  /* 입력 폼 크기 키우기 */
  .fg input { padding:10px 12px; font-size:15px; border-radius:8px; }
  .fg label { font-size:12px; margin-bottom:5px; }
  .grid2 { grid-template-columns:1fr 1fr; gap:8px; }
  .btn-calc { padding:14px; font-size:16px; margin-top:10px; }

  /* 탭 - 모바일 스크롤 */
  .tabs { flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px; gap:4px; }
  .tabs::-webkit-scrollbar { height:3px; }
  .tabs::-webkit-scrollbar-thumb { background:#1F4E79; border-radius:3px; }
  .tab { padding:10px 14px; font-size:12px; white-space:nowrap; flex-shrink:0; }
  .tab-badge { display:none; }

  /* 테이블 모바일 - 카드형 */
  .tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .tbl-wrap::before { content:'← 좌우로 스크롤'; display:block; font-size:10px; color:#999; margin-bottom:4px; }
  table { min-width:520px; }
  th, td { padding:8px 6px; }
  input.ni { width:52px; padding:6px 4px; font-size:14px; }
  input.pi { width:88px; padding:6px 4px; font-size:13px; }

  /* 합계 박스 */
  .total-row { justify-content:stretch; }
  .total-box { min-width:unset; width:100%; }
  .total-box td { padding:10px 14px; font-size:13px; }
  .total-box .grand td { font-size:15px; }

  /* 툴바 */
  .toolbar { gap:6px; }
  .apt-title { font-size:14px; }
  .btn-sm { padding:9px 14px; font-size:12px; }

  /* 요약바 */
  .summary-bar { gap:6px; }
  .sb { padding:4px 10px; font-size:11px; }

  /* 전체 합계 */
  #grand_total { font-size:13px; padding:10px 14px; }
}

/* 아이폰 노치/홈바 대응 */
@supports(padding: max(0px)) {
  .header { padding-left: max(24px, env(safe-area-inset-left)); padding-right: max(24px, env(safe-area-inset-right)); }
  .wrap { padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); }
}

@media print {
  body { background:white; }
  .header, .wrap>*:first-child, .toolbar .btn-print, .toolbar .btn-reset, .tabs { display:none !important; }
  .wrap { grid-template-columns:1fr; padding:0; }
  .card { box-shadow:none; }
  input.ni, input.pi { border:none; background:transparent; }
  .tab-pane:not(.active) { display:block !important; page-break-before:always; }
  /* 인쇄: 공급단가 컬럼 숨김, 판매단가만 표시 */
  th:nth-child(5), td:nth-child(5) { display:none !important; }
  .no-print-col { display:table-cell !important; }
  /* 금액: 판매가만 표시 (공급가 숨김) */
  #amt_가구_0 span, [id^="amt_"] span { display:none !important; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🏢 아파트 관리사무소 통합 견적 시스템</h1>
    <p>인원 입력 → 5개 카테고리 수량 자동계산</p>
  </div>
</div>

<div class="wrap">

<!-- ── 좌측 입력 ── -->
<div class="card" style="align-self:start">
  <div class="card-hd">📋 아파트 기본 정보</div>
  <div class="card-bd">
    <div class="fg"><label>아파트명</label><input id="aptName" placeholder="예) 힐스테이트 봉담" /></div>
    <div class="fg"><label>세대수</label><input type="number" id="세대수" placeholder="예) 862" /></div>

    <div class="sec" style="background:#EBF3FB;padding:5px 8px;border-radius:5px;color:#1F4E79;border:none;margin-top:14px;">🏢 관리소직원</div>
    <div class="grid2">
      <div class="fg"><label>소 장</label><input type="number" id="소장" value="1" min="0" oninput="updateTotal()"/></div>
      <div class="fg"><label>경리대리</label><input type="number" id="경리대리" value="1" min="0" oninput="updateTotal()"/></div>
      <div class="fg"><label>관리과장</label><input type="number" id="관리과장" value="1" min="0" oninput="updateTotal()"/></div>
      <div class="fg"><label>서무주임</label><input type="number" id="서무주임" value="1" min="0" oninput="updateTotal()"/></div>
      <div class="fg"><label>기전주임</label><input type="number" id="기전주임" value="1" min="0" oninput="updateTotal()"/></div>
      <div class="fg"><label>기전 주/야</label><input type="number" id="기전주야" value="4" min="0" oninput="updateTotal()"/></div>
    </div>
    <div class="fg" style="margin-top:2px;">
      <label style="color:#888">관리소직원 소계</label>
      <input type="number" id="관리소소계" readonly style="background:#f5f5f5;color:#1F4E79;font-weight:700"/>
    </div>

    <div class="sec" style="background:#FEF0F0;padding:5px 8px;border-radius:5px;color:#c0392b;border:none;margin-top:14px;">🛡 경비</div>
    <div class="grid2">
      <div class="fg"><label>경 비</label><input type="number" id="경비" value="5" min="0" oninput="updateTotal()"/></div>
    </div>

    <div class="sec" style="background:#EAFAF1;padding:5px 8px;border-radius:5px;color:#1e8449;border:none;margin-top:14px;">🧹 미화</div>
    <div class="grid2">
      <div class="fg"><label>미화원</label><input type="number" id="미화원" value="8" min="0" oninput="updateTotal()"/></div>
      <div class="fg"><label>외곽미화</label><input type="number" id="외곽미화" value="2" min="0" oninput="updateTotal()"/></div>
    </div>

    <div style="border-top:2px solid #1F4E79;margin-top:12px;padding-top:10px;">
    <div class="fg"><label style="font-size:12px;font-weight:700;color:#1F4E79">총 인원</label><input type="number" id="총원" readonly style="background:#1F4E79;color:white;font-weight:700;font-size:14px;text-align:center"/></div>
    </div>

    <button class="btn-calc" onclick="calculate()">⚡ 수량 자동 계산</button>
    <p class="note">※ 수량·단가는 계산 후 수정 가능합니다.</p>
  </div>
</div>

<!-- ── 우측 견적 ── -->
<div class="card">
  <div class="card-hd">📄 견적서</div>
  <div class="card-bd">
    <div id="quoteArea">
      <div class="empty"><div>📊</div><p>왼쪽에서 인원을 입력하고<br><b>수량 자동 계산</b>을 눌러주세요</p></div>
    </div>
  </div>
</div>

</div><!-- /wrap -->

<script>
// ── 총원 자동계산 ──
function updateTotal() {
  const 관리소ids = ['소장','경리대리','관리과장','서무주임','기전주임','기전주야'];
  const 관리소 = 관리소ids.reduce((s,id) => s + (parseInt(document.getElementById(id).value)||0), 0);
  document.getElementById('관리소소계').value = 관리소;
  const 경비 = parseInt(document.getElementById('경비').value)||0;
  const 미화원 = parseInt(document.getElementById('미화원').value)||0;
  const 외곽미화 = parseInt(document.getElementById('외곽미화').value)||0;
  document.getElementById('총원').value = 관리소 + 경비 + 미화원 + 외곽미화;
}
updateTotal();

// ── 숫자 포맷 ──
const fmt = n => n > 0 ? Number(n).toLocaleString('ko-KR')+'원' : '-';

// ── 세대수 비례 헬퍼 (기준 600세대) ──
// 세대수가 많을수록 비례해서 수량 증가, 최소 base의 50%
const sd = (base, s, min) => Math.max(min !== undefined ? min : Math.ceil(base * 0.5), Math.round(base * Math.max(0.3, s.세대수 / 600)));

// ── 가구 데이터 (5개 카테고리) ──
// scale: 'fixed'=기준수량 그대로, 'office'=사무직, 'giJeon'=기전직, 'gyeongBi'=경비,
//        'miHwa'=미화원+외곽, 'outdoor'=기전+경비+미화, 'all'=전체, fn=계산식
const DATA = {

  가구: [
    {no:1,  name:"망펄 탑책상",          spec:"1800*800*720",       price:450000, note:"소장용",      scale: s => s.소장},
    {no:2,  name:"망펄 탑책상",          spec:"1400*800*720",       price:320000, note:"일반직원",    scale: s => s.사무직-s.소장 + Math.ceil(s.기전주야/2)},
    {no:3,  name:"펜목재 이동서랍 망펄", spec:"420*520*585",        price:85000,  note:"직원서랍",    scale: s => s.사무직 + s.기전주임 + Math.ceil(s.기전주야/2)},
    {no:4,  name:"원형테이블",           spec:"900*720/원통형",      price:180000, note:"소장실",      scale: s => s.소장>0?1:0},
    {no:5,  name:"회의용사각테이블",     spec:"1800*900*720",       price:350000, note:"회의실",      scale: s => s.세대수>600?2:1},
    {no:6,  name:"책장/5단/고급/올문",   spec:"800*400*1880",       price:220000, note:"대형책장",    scale: s => s.소장+s.경리대리+s.관리과장+2},
    {no:7,  name:"책장/2단/고급/올문",   spec:"800*400*825",        price:120000, note:"소형책장",    scale: s => s.기전주임+2},
    {no:8,  name:"2인라카장",            spec:"600*550*1900",       price:180000, note:"격일라카",    scale: s => Math.ceil(s.기전주야/2)},
    {no:9,  name:"4인라카장",            spec:"600*550*1900",       price:320000, note:"격일라카",    scale: s => s.기전주야>4 ? Math.floor(s.기전주야/4) : 0},
    {no:10, name:"망펄 2단 탑협탁",      spec:"400*800*720",        price:95000,  note:"직원협탁",    scale: s => s.사무직+s.기전주임+Math.ceil(s.기전주야/2)},
    {no:11, name:"킹덤중역의자",         spec:"중역의자",             price:350000, note:"소장의자",    scale: s => s.소장},
    {no:12, name:"사무용의자",           spec:"S1매쉬",              price:120000, note:"일반의자",    scale: s => s.사무직-s.소장+s.기전주임},
    {no:13, name:"회의용의자",           spec:"랙스",                price:65000,  note:"회의의자",    scale: s => Math.min(20, Math.max(8, Math.ceil(s.세대수/50)))},
    {no:14, name:"민원인대기의자",       spec:"3인용",               price:150000, note:"민원대기",    scale: s => s.세대수>600?2:1},
    {no:15, name:"카운터상판",           spec:"1850*350",            price:250000, note:"민원카운터",  scale: s => s.세대수>600?2:1},
    {no:16, name:"파티션",              spec:"H1100*W1800*45T",     price:180000, note:"대형파티션",  scale: s => 1},
    {no:17, name:"파티션",              spec:"H1100*W1400*45T",     price:150000, note:"중형파티션",  scale: s => s.사무직-s.소장+s.기전주임},
    {no:18, name:"파티션",              spec:"H1100*W800*45T",      price:120000, note:"소형파티션",  scale: s => Math.ceil((s.사무직-s.소장+s.기전주임)*1.5)},
    {no:19, name:"파티션",              spec:"H1100*W400*45T",      price:95000,  note:"미니파티션",  scale: s => s.사무직-s.소장+s.기전주임},
    {no:20, name:"파티션부속",          spec:"H1100/삼각바/사각바",  price:85000,  note:"연결부속",    scale: s => Math.ceil((s.사무직-s.소장+s.기전주임)*1.5)},
    {no:21, name:"파티션부속",          spec:"마감바",               price:75000,  note:"마감",        scale: s => Math.ceil((s.사무직-s.소장+s.기전주임)*1.5)},
    {no:22, name:"설치 배송비",         spec:"-",                   price:0,      note:"별도산정",    scale: s => 1},
  ],

  집기: [
    {no:1,  name:"데스크탑(조립) 업",          spec:"i3-13세대/16GB/500GB SSD",    price:720000, note:"사무직",   scale: s => s.사무직},
    {no:2,  name:"데스크탑(조립)",             spec:"i3-13세대/8GB/256GB SSD",     price:560000, note:"기전직",   scale: s => s.기전주임+Math.ceil(s.기전주야/2)},
    {no:3,  name:'24" 평면모니터',             spec:"중소기업",                      price:90000,  note:"사무+기전", scale: s => s.사무직+s.기전주임+Math.ceil(s.기전주야/2)},
    {no:4,  name:"OS",                        spec:"WIN11 정품",                   price:150000, note:"PC수량",   scale: s => s.사무직+s.기전주임+Math.ceil(s.기전주야/2)},
    {no:5,  name:"키보드 마우스 세트",          spec:"장패드포함",                    price:30000,  note:"PC수량",   scale: s => s.사무직+s.기전주임+Math.ceil(s.기전주야/2)},
    {no:6,  name:"스피커",                     spec:"-",                            price:10000,  note:"사무실",   scale: s => s.사무직+Math.ceil(s.기전주임/2)},

    {no:37, name:"압축기",                 spec:"파워3중",                    price:4700,   scale:s=>2},
    {no:38, name:"피스톤압축기",           spec:"파워피스톤",                 price:5300,   scale:s=>2},
    {no:39, name:"양동이",                 spec:"10L",                        price:5800,   scale:s=>Math.max(5, s.미화원+s.외곽미화)},
    {no:40, name:"점보롤 전용용기",        spec:"-",                          price:5500,   scale:s=>Math.max(10, s.미화원+s.외곽미화+s.경비)},
    {no:41, name:"플라스틱빗자루",         spec:"도로비",                     price:5000,   scale:s=>2},
  ],
};

// ── 탭 전환 ──
let activeTab = '가구';
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.style.display = p.dataset.pane === tab ? '' : 'none');
}

// ── 카테고리별 마진율 가져오기 ──
function getMargin(cat) {
  const v = parseFloat(document.getElementById(`margin_${cat}`)?.value) || 0;
  return 1 + v / 100;
}

// ── 합계 재계산 (마진 적용) ──
function recalcAll() {
  let grandSupply = 0, grandSell = 0;
  Object.keys(DATA).forEach(cat => {
    const margin = getMargin(cat);
    let subSupply = 0, subSell = 0;
    DATA[cat].forEach((f, i) => {
      const qty      = parseInt(document.getElementById(`qty_${cat}_${i}`)?.value) || 0;
      const pi       = document.getElementById(`price_${cat}_${i}`);
      const supply   = pi ? parseInt(pi.value.replace(/[^0-9]/g,'')) || 0 : 0;
      const sellUnit = Math.round(supply * margin);
      const sellAmt  = qty * sellUnit;
      const supplyAmt= qty * supply;
      subSupply += supplyAmt;
      subSell   += sellAmt;

      // 화면에 표시: 공급가 금액 (회색) + 판매가 금액 (진하게)
      const amtEl = document.getElementById(`amt_${cat}_${i}`);
      if (amtEl) {
        if (sellAmt > 0) {
          amtEl.innerHTML = `<span style="color:#999;font-size:10px;display:block">${(supplyAmt).toLocaleString('ko-KR')}원</span><b>${fmt(sellAmt)}</b>`;
        } else {
          amtEl.textContent = (f.no===22&&cat==='가구') ? '별도산정' : '-';
        }
      }
      // 판매단가 표시
      const sellEl = document.getElementById(`sell_${cat}_${i}`);
      if (sellEl) sellEl.textContent = supply > 0 ? sellUnit.toLocaleString('ko-KR')+'원' : '-';
    });
    grandSupply += subSupply;
    grandSell   += subSell;
    const vatSell = Math.round(subSell * 0.1);
    const el = id => document.getElementById(id);
    if (el(`sub_${cat}`)) el(`sub_${cat}`).innerHTML = `<span style="color:#999;font-size:10px">${fmt(subSupply)}</span><br><b>${fmt(subSell)}</b>`;
    if (el(`vat_${cat}`)) el(`vat_${cat}`).textContent = fmt(vatSell);
    if (el(`tot_${cat}`)) el(`tot_${cat}`).textContent = fmt(subSell + vatSell);
    if (el(`badge_${cat}`)) el(`badge_${cat}`).textContent = DATA[cat].length + '품목';
  });
  const gVat = Math.round(grandSell * 0.1);
  const el = document.getElementById('grand_total');
  if (el) {
    el.innerHTML = `공급가 합계: <span style="opacity:.7">${grandSupply.toLocaleString('ko-KR')}원</span> &nbsp;|&nbsp; 마진 적용 판매가 (VAT포함): <b>${(grandSell + gVat).toLocaleString('ko-KR')}원</b>`;
  }
}

// ── 테이블 HTML 생성 ──
function makeTable(cat, items, s) {
  let rows = '';
  items.forEach((f, i) => {
    const qty = f.scale(s);
    const p   = f.price;
    const amt = qty * p;
    const brand = f.brand ? `<span style="font-size:10px;color:#888">${f.brand}</span><br>` : '';
    const code  = f.code  ? `<span style="font-size:9px;color:#bbb">${f.code}</span>` : '';
    rows += `<tr>
      <td class="tc" style="color:#999;font-size:11px">${f.no}</td>
      <td class="tl" style="min-width:100px">${brand}${f.name}</td>
      <td class="tc" style="font-size:10px;color:#777;min-width:100px">${f.spec}${code?'<br>'+code:''}</td>
      <td class="tc">
        <input type="number" class="ni" id="qty_${cat}_${i}" value="${qty}" min="0" oninput="recalcAll()"/>
      </td>
      <td class="tr">
        <input type="text" class="pi" id="price_${cat}_${i}"
          value="${p > 0 ? p.toLocaleString('ko-KR') : ''}"
          placeholder="${cat==='가구'&&f.no===22?'별도':'단가'}"
          inputmode="numeric"
          oninput="this.value=this.value.replace(/[^0-9,]/g,'');recalcAll()"/>
      </td>
      <td class="tr no-print-col" id="sell_${cat}_${i}" style="color:#e67e22;font-weight:700;font-size:11px">-</td>
      <td class="tr" id="amt_${cat}_${i}">${amt>0?fmt(amt):(cat==='가구'&&f.no===22?'별도산정':'-')}</td>
    </tr>`;
  });
  return `
  <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#FFF8E1;border-radius:8px;border:1.5px solid #FFD600;margin-bottom:12px;flex-wrap:wrap;">
    <span style="font-size:12px;font-weight:700;color:#7B5800;">💰 마진율</span>
    <input type="number" id="margin_${cat}" value="20" min="0" max="200" step="1"
      style="width:65px;padding:5px 8px;border:1.5px solid #FFD600;border-radius:6px;font-size:15px;font-weight:700;color:#7B5800;background:white;text-align:center"
      oninput="recalcAll()" />
    <span style="font-size:12px;color:#999">%</span>
    <span style="font-size:11px;color:#aaa">공급가 × (1 + 마진%/100) = 판매가</span>
  </div>
  <div class="tbl-wrap">
  <table>
    <thead><tr>
      <th style="width:36px">NO</th>
      <th style="text-align:left">품목명</th>
      <th>규격/모델명</th>
      <th style="width:60px">수량</th>
      <th style="width:95px">공급단가</th>
      <th style="width:90px" class="no-print-col">판매단가</th>
      <th style="width:110px">금액(원)</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  </div>
  <div class="total-row">
    <div class="total-box">
      <table>
        <tr><td class="tl2">소&nbsp;&nbsp;&nbsp;계</td><td class="tr" id="sub_${cat}">-</td></tr>
        <tr><td class="tl2">부가세 (10%)</td><td class="tr" id="vat_${cat}">-</td></tr>
        <tr class="grand"><td class="tl2">합&nbsp;&nbsp;&nbsp;계</td><td class="tr" id="tot_${cat}">-</td></tr>
      </table>
    </div>
  </div>`;
}

// ── 메인 계산 ──
function calculate() {
  const aptName = document.getElementById('aptName').value.trim() || '○○아파트';
  const 세대수   = parseInt(document.getElementById('세대수').value) || 0;
  const 소장     = parseInt(document.getElementById('소장').value)     || 0;
  const 경리대리 = parseInt(document.getElementById('경리대리').value) || 0;
  const 관리과장 = parseInt(document.getElementById('관리과장').value) || 0;
  const 서무주임 = parseInt(document.getElementById('서무주임').value) || 0;
  const 기전주임 = parseInt(document.getElementById('기전주임').value) || 0;
  const 기전주야 = parseInt(document.getElementById('기전주야').value) || 0;
  const 경비     = parseInt(document.getElementById('경비').value)     || 0;
  const 미화원   = parseInt(document.getElementById('미화원').value)   || 0;
  const 외곽미화 = parseInt(document.getElementById('외곽미화').value) || 0;

  const s = {
    소장, 경리대리, 관리과장, 서무주임, 기전주임, 기전주야, 경비, 미화원, 외곽미화,
    사무직: 소장 + 경리대리 + 관리과장 + 서무주임,
    기전:   기전주임 + 기전주야,
    미화:   미화원 + 외곽미화,
    세대수,
    총원: 소장+경리대리+관리과장+서무주임+기전주임+기전주야+경비+미화원+외곽미화
  };

  const today = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  const catMap = {가구:'사무용가구', 집기:'사무집기', 용품:'사무용품', 공기구:'공기구', 미화:'미화용품'};

  let tabsHtml = '<div class="tabs">';
  let panesHtml = '';
  Object.entries(catMap).forEach(([key, label], idx) => {
    tabsHtml += `<div class="tab${idx===0?' active':''}" data-tab="${key}" onclick="switchTab('${key}')">${label}<span class="tab-badge" id="badge_${key}">${DATA[key].length}품목</span></div>`;
    panesHtml += `<div class="tab-pane" data-pane="${key}" style="display:${idx===0?'':'none'}">${makeTable(key, DATA[key], s)}</div>`;
  });
  tabsHtml += '</div>';

  document.getElementById('quoteArea').innerHTML = `
    <div class="toolbar">
      <div>
        <div class="apt-title">${aptName}</div>
        <div style="font-size:11px;color:#888;margin-top:2px;">견적일: ${today}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-sm btn-reset" onclick="location.reload()">↺ 초기화</button>
        <button class="btn-sm btn-print" onclick="window.print()">🖨 인쇄/PDF</button>
      </div>
    </div>
    <div class="summary-bar">
      <span class="sb">🏠 ${세대수.toLocaleString()}세대</span>
      <span class="sb">👥 총 ${s.총원}명</span>
      <span class="sb">사무직 ${s.사무직}명</span>
      <span class="sb">기전직 ${s.기전}명</span>
      <span class="sb">경비 ${경비}명</span>
      <span class="sb">미화 ${s.미화}명</span>
    </div>
    ${tabsHtml}
    ${panesHtml}
    <div id="grand_total" style="margin-top:14px;padding:10px 16px;background:#1F4E79;color:white;border-radius:8px;font-size:14px;font-weight:700;text-align:right;"></div>
    <p class="note">※ 수량과 단가는 클릭하여 직접 수정 가능합니다. 단가 입력 시 금액 자동 계산됩니다.</p>
  `;
  activeTab = '가구';
  recalcAll();
}

</script>
</body>
</html>
