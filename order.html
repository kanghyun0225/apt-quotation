<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>납품 견적 요청</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#f0f2f5;color:#333;font-size:14px}
.header{background:#1e3a5f;color:#fff;padding:16px 20px;text-align:center}
.header h1{font-size:18px;font-weight:700}
.header p{font-size:12px;opacity:.8;margin-top:4px}
.tabs{display:flex;background:#fff;border-bottom:2px solid #1e3a5f;position:sticky;top:0;z-index:10}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:#888;border-bottom:3px solid transparent;transition:.2s}
.tab.active{color:#1e3a5f;border-bottom-color:#1e3a5f}
.tab-badge{display:inline-block;background:#e0e6ef;color:#1e3a5f;border-radius:10px;font-size:11px;padding:1px 7px;margin-left:4px}
.content{padding:12px}
.section{display:none}
.section.active{display:block}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
th{background:#1e3a5f;color:#fff;padding:10px 8px;text-align:center;font-size:12px;font-weight:600}
th:first-child{text-align:left;width:40px}
th:nth-child(2){text-align:left}
th:last-child{width:110px}
td{padding:8px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
td:first-child{text-align:center;color:#aaa;font-size:12px}
td:last-child{text-align:center}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f7f9fc}
.qty-stepper{display:flex;align-items:center;justify-content:center;gap:0}
.qty-btn{width:34px;height:34px;background:#1e3a5f;color:#fff;border:none;border-radius:6px;font-size:20px;font-weight:700;cursor:pointer;touch-action:manipulation;user-select:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.qty-btn:active{background:#2a4f82;transform:scale(.93)}
.qty-val{min-width:38px;text-align:center;padding:0 4px}
.qty-val span{display:block;font-size:15px;font-weight:700;color:#333;line-height:1.2}
.qty-val span.has-value{color:#2e7d32}
.qty-val small{display:block;font-size:9px;color:#aaa;margin-top:1px}
.spec{font-size:11px;color:#999;display:block;margin-top:1px}
.item-thumb{width:48px;height:48px;object-fit:contain;border:1px solid #eee;border-radius:4px;margin-right:8px;flex-shrink:0;vertical-align:middle}
td:nth-child(2){display:flex;align-items:center;gap:0}
.item-info{display:flex;flex-direction:column;flex:1}
.bottom-bar{position:sticky;bottom:0;background:#fff;border-top:2px solid #1e3a5f;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -2px 8px rgba(0,0,0,.1)}
.summary{font-size:13px;color:#555}
.summary strong{color:#1e3a5f;font-size:16px}
.btn-send{background:#1e3a5f;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.btn-send:hover{background:#2a4f82}
.btn-send:disabled{background:#aaa;cursor:not-allowed}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px 24px;max-width:360px;width:90%;text-align:center}
.modal h2{font-size:18px;color:#1e3a5f;margin-bottom:10px}
.modal p{font-size:14px;color:#555;margin-bottom:8px;line-height:1.6}
.modal .icon{font-size:48px;margin-bottom:12px}
.modal .btn-close{margin-top:20px;background:#1e3a5f;color:#fff;border:none;padding:10px 32px;border-radius:8px;font-size:15px;cursor:pointer;font-family:inherit}
.name-input-row{padding:12px 16px;background:#fff;border-bottom:1px solid #eee}
.name-input-row label{font-size:12px;color:#888;display:block;margin-bottom:4px}
.name-input-row input{width:100%;padding:8px 12px;border:1.5px solid #ccd6e0;border-radius:6px;font-size:14px;font-family:inherit}
.name-input-row input:focus{outline:none;border-color:#1e3a5f}
.selected-count{font-size:12px;color:#2e7d32;font-weight:600}
</style>
</head>
<body>

<div class="header">
  <h1>📋 납품 견적 요청</h1>
  <p>한스코퍼레이션 | 필요한 품목의 수량을 입력해 주세요</p>
</div>

<div class="name-input-row">
  <label>아파트/단지명 (필수)</label>
  <input type="text" id="aptName" placeholder="예) 힐스테이트 ○○○ 관리사무소">
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('용품')">사무용품 <span class="tab-badge" id="badge-용품">0</span></div>
  <div class="tab" onclick="switchTab('공기구')">공기구 <span class="tab-badge" id="badge-공기구">0</span></div>
  <div class="tab" onclick="switchTab('미화')">미화용품 <span class="tab-badge" id="badge-미화">0</span></div>
</div>

<div class="content">
  <div id="section-용품" class="section active"></div>
  <div id="section-공기구" class="section"></div>
  <div id="section-미화" class="section"></div>
</div>

<div class="bottom-bar">
  <div class="summary">
    입력된 품목: <strong id="totalCount">0</strong>개
    <div class="selected-count" id="selectedInfo"></div>
  </div>
  <button class="btn-send" id="btnSend" onclick="sendRequest()">📨 견적 요청 보내기</button>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="icon" id="modalIcon">✅</div>
    <h2 id="modalTitle">전송 완료</h2>
    <p id="modalMsg">견적 요청이 한스코퍼레이션으로 전달됐습니다.<br>확인 후 빠르게 연락드리겠습니다.</p>
    <button class="btn-close" onclick="closeModal()">확인</button>
  </div>
</div>

const qty = {};

function buildTable(sec) {
  const items = ITEMS[sec];
  let rows = items.map(it => {
    const key = sec + '_' + it.no;
    const step = it.moq || 1;
    const imgHtml = it.img ? `<img src="${it.img}" class="item-thumb" onerror="this.style.display='none'">` : '';
    return `<tr>
      <td>${it.no}</td>
      <td>${imgHtml}<div class="item-info"><span>${it.name}</span>${it.spec ? '<span class="spec">'+it.spec+'</span>' : ''}</div></td>
      <td><div class="qty-stepper">
        <button class="qty-btn" onclick="changeQty('${key}',${-step})">−</button>
        <div class="qty-val"><span id="q_${key}">0</span>${step>1?`<small>×${step}</small>`:''}</div>
        <button class="qty-btn" onclick="changeQty('${key}',${step})">+</button>
      </div></td>
    </tr>`;
  }).join('');
  document.getElementById('section-' + sec).innerHTML =
    `<table><thead><tr><th>No</th><th>품명 / 규격</th><th>수량</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function changeQty(key, delta) {
  const el = document.getElementById('q_' + key);
  const cur = parseInt(el.textContent) || 0;
  const nv = Math.max(0, cur + delta);
  el.textContent = nv;
  if (nv > 0) { qty[key] = nv; el.classList.add('has-value'); }
  else { delete qty[key]; el.classList.remove('has-value'); }
  updateCount();
}

function updateCount() {
  const total = Object.keys(qty).length;
  document.getElementById('totalCount').textContent = total;
  const byTab = {};
  Object.keys(qty).forEach(k => {
    const sec = k.split('_')[0];
    byTab[sec] = (byTab[sec]||0) + 1;
  });
  ['용품','공기구','미화'].forEach(s => {
    document.getElementById('badge-' + s).textContent = byTab[s] || 0;
  });
}

function switchTab(sec) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const secs = ['용품','공기구','미화'];
    t.classList.toggle('active', secs[i] === sec);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + sec).classList.add('active');
}

function sendRequest() {
  const apt = document.getElementById('aptName').value.trim();
  if (!apt) { alert('아파트/단지명을 입력해 주세요.'); document.getElementById('aptName').focus(); return; }
  if (Object.keys(qty).length === 0) { alert('수량을 입력한 품목이 없습니다.'); return; }

  const lines = [];
  ['용품','공기구','미화'].forEach(sec => {
    const sName = {용품:'사무용품',공기구:'공기구',미화:'미화용품'}[sec];
    const secItems = [];
    ITEMS[sec].forEach(it => {
      const key = sec + '_' + it.no;
      if (qty[key]) secItems.push(`  ${it.no}. ${it.name}${it.spec?' ('+it.spec+')':''} × ${qty[key]}개`);
    });
    if (secItems.length) { lines.push('[' + sName + ']'); lines.push(...secItems); lines.push(''); }
  });

  const body = `견적 요청 - ${apt}\n\n` + lines.join('\n');
  const subject = encodeURIComponent(`[견적요청] ${apt}`);
  const bodyEnc = encodeURIComponent(body);

  document.getElementById('btnSend').disabled = true;

  // FormSubmit 방식
  const form = document.createElement('form');
  form.action = 'https://formsubmit.co/kanghyun0225@gmail.com';
  form.method = 'POST';
  form.style.display = 'none';

  const fields = {
    '_subject': `[견적요청] ${apt}`,
    '_captcha': 'false',
    '_template': 'table',
    '_next': window.location.href + '?sent=1',
    '아파트명': apt,
    '견적내용': lines.join('\n')
  };
  Object.entries(fields).forEach(([k,v]) => {
    const inp = document.createElement('input');
    inp.name = k; inp.value = v;
    form.appendChild(inp);
  });
  document.body.appendChild(form);

  // Also open mailto as fallback
  window.location.href = `mailto:kanghyun0225@gmail.com?subject=${subject}&body=${bodyEnc}`;

  showModal('✅','전송 완료','견적 요청이 한스코퍼레이션으로 전달됐습니다.\n확인 후 빠르게 연락드리겠습니다.');
}

function showModal(icon, title, msg) {
  document.getElementById('modalIcon').textContent = icon;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').innerHTML = msg.replace(/\n/g,'<br>');
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('btnSend').disabled = false;
}

// Init
['용품','공기구','미화'].forEach(buildTable);

// Handle ?sent=1
if (location.search.includes('sent=1')) {
  showModal('✅','전송 완료','견적 요청이 전달됐습니다.\n확인 후 빠르게 연락드리겠습니다.');
  history.replaceState(null,'',location.pathname);
}
